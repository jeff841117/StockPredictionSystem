{% extends "base.html" %}

{% block title %}首頁 | {{ project_name }}{% endblock %}

{% block content %}
<section class="hero">
    <h2>股票資料查詢最小版本</h2>
    <p>{{ message }}</p>
    <p>固定查詢區間：{{ fixed_interval }}</p>
</section>

<section class="result-panel">
    <form class="search-form" action="{{ url_for('search_stock') }}" method="get">
        <label for="stock_no">台股代號</label>
        <div class="search-row">
            <input
                id="stock_no"
                name="stock_no"
                type="text"
                inputmode="numeric"
                pattern="[0-9]{4,6}"
                placeholder="例如 2330"
                value="{{ stock_no or '' }}"
                required
            >
            <button type="submit">查詢</button>
        </div>
        <p class="help-text">本輪固定查詢區間，不提供前端切換日期。</p>
    </form>

    {% if error_message %}
    <div class="error-box">
        {{ error_message }}
    </div>
    {% endif %}
</section>
{% endblock %}
