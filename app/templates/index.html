{% extends "base.html" %}

{% block title %}首頁 | {{ project_name }}{% endblock %}

{% block content %}
<section class="hero">
    <h2>股票資料查詢</h2>
    <p>{{ message }}</p>
    <p>預設查詢區間：{{ fixed_interval }}</p>
</section>

<section class="result-panel">
    <form class="search-form" action="{{ url_for('search_stock') }}" method="get">
        <label for="stock_no">台股代號</label>
        <div class="search-row">
            <input
                id="stock_no"
                name="stock_no"
                type="text"
                inputmode="numeric"
                pattern="[0-9]{4,6}"
                placeholder="例如 2330"
                value="{{ stock_no or '' }}"
                required
            >
            <button type="submit">查詢</button>
        </div>
        <div class="search-row search-row-dates">
            <div class="field-group">
                <label for="start_date">開始日期</label>
                <input
                    id="start_date"
                    name="start_date"
                    type="date"
                    value="{{ start_date or '' }}"
                    required
                >
            </div>
            <div class="field-group">
                <label for="end_date">結束日期</label>
                <input
                    id="end_date"
                    name="end_date"
                    type="date"
                    value="{{ end_date or '' }}"
                    required
                >
            </div>
        </div>
        <p class="help-text">可自行調整查詢區間；歷史資料、走勢圖與 MA5 / MA20 都會依此同步更新。</p>
    </form>

    {% if error_message %}
    <div class="error-box">
        {{ error_message }}
    </div>
    {% endif %}
</section>
{% endblock %}
