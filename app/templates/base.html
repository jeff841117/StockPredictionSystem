<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ project_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="site-header-top">
                <div>
                    <p class="eyebrow">StockPredictionSystem</p>
                    <h1>{{ project_name }}</h1>
                    <p class="subtitle">台股研究、模擬交易與投資組合工作台</p>
                </div>
                <div class="status-stack">
                    <span class="status-pill live">MVP v1</span>
                    <span class="status-pill soft">TWSE / 本機 SQLite</span>
                    {% if request.state.current_username %}
                    <span class="status-pill soft">已登入：{{ request.state.current_username }}</span>
                    <a class="auth-link" href="{{ url_for('logout') }}">登出</a>
                    {% else %}
                    <a class="auth-link" href="{{ url_for('login_page') }}">登入</a>
                    <a class="auth-link" href="{{ url_for('register_page') }}">註冊</a>
                    {% endif %}
                </div>
            </div>
            <nav class="site-nav">
                <a class="{% if request.url.path == '/' or request.url.path.startswith('/stocks') %}active{% endif %}" href="{{ url_for('index') }}">股票查詢</a>
                <a class="{% if request.url.path.startswith('/watchlist') %}active{% endif %}" href="{{ url_for('watchlist_page') }}">收藏清單</a>
                <a class="{% if request.url.path == '/trades' %}active{% endif %}" href="{{ url_for('trades_page') }}">交易紀錄</a>
                <a class="{% if request.url.path.startswith('/trades/portfolio') %}active{% endif %}" href="{{ url_for('portfolio_page') }}">持股總覽</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
